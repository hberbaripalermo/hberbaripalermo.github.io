<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BERBARI</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #ffffff;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    box-sizing: border-box;
    text-align: center;
  }
  .brand {
    font-size: 48px;
    font-weight: 600;
    letter-spacing: 0.12em;
    margin: 0 0 16px;
  }
  .status {
    font-size: 18px;
    font-weight: 400;
    color: #555;
    margin: 0 0 40px;
  }
  .contact {
    font-size: 15px;
    color: #333;
  }
  .contact a {
    color: #111;
    text-decoration: none;
    border-bottom: 1px solid #111;
  }
  .contact a:hover {
    opacity: 0.7;
  }
  @media (max-width: 480px) {
    .brand { font-size: 34px; }
    .status { font-size: 16px; }
  }
</style>
</head>
<body>
<main class="wrap">
  <h1 class="brand">BERBARI</h1>
  <p class="status">Sitio en construcción</p>
  <p class="contact">Contacto: <a href="mailto:hberbari@gmail.com">hberbari@gmail.com</a></p>
</main>
</body>
</html>
